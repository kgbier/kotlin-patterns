# This file was generated by the Gradle 'init' task.
# https://docs.gradle.org/current/userguide/version_catalogs.html#sec::toml-dependencies-format

[versions]

# Kotlin
kotlin = "2.4.0"               # https://github.com/JetBrains/kotlin/releases

# Android
android-minSdk = "24"
android-compileSdk = "37"
android-targetSdk = "37"
agp = "9.2.1"                  # https://developer.android.com/build/releases/gradle-plugin

# KTX
kotlinx-coroutines = "1.11.0"

[libraries]

androidx-activity-compose = "androidx.activity:activity-compose:1.13.0"
androidx-lifecycle-compose = "androidx.lifecycle:lifecycle-viewmodel-compose:2.11.0"

# KTX
kotlinx-coroutines = { module = "org.jetbrains.kotlinx:kotlinx-coroutines-core", version.ref = "kotlinx-coroutines" }

[plugins]

# JVM
kotlin-jvm = { id = "org.jetbrains.kotlin.jvm", version.ref = "kotlin" }

# Android
android-application = { id = "com.android.application", version.ref = "agp" }
android-library = { id = "com.android.library", version.ref = "agp" }

# Compose
compose-compiler = { id = "org.jetbrains.kotlin.plugin.compose", version.ref = "kotlin" }
